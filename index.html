<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishola Akande | Cloud Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0; 
            padding: 0;
            background-color: #0a0c10;
            font-family: 'Inter', sans-serif;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Disables all scrolling */
        }

        main { 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            height: 100vh; 
            width: 100%;
            transform: scale(1.5);
            transform-origin: center;
        }

        /* 1. THE BIG "IA" BACKGROUND */
        .hero-container {
            position: relative;
            width: 100%;
            height: 300px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-mask-container {
            width: 100%;
            height: 100%;
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><text x="50%" y="50%" dy=".35em" text-anchor="middle" font-size="350px" font-family="Inter, sans-serif" font-weight="700">IA</text></svg>');
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><text x="50%" y="50%" dy=".35em" text-anchor="middle" font-size="350px" font-family="Inter, sans-serif" font-weight="700">IA</text></svg>');
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }

        .cloud-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            filter: brightness(1.3);
        }

        /* 2. YOUR NAME */
        .full-name {
            font-size: 3.5rem; 
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #bb9f03;
            margin: 0;
            line-height: 1;
        }

        /* 3. SUBTITLE */
        p {
            font-size: 1.2rem;
            color: #8a8d91;
            margin: 15px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 4. TAGS */
        .tag-container {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .tag {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 4px;
            font-size: .8rem;
            color: #8a8d91;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(5px);
            transition: all .3s ease-in-out;
            cursor: pointer;
        }

        .tag:hover {
            color: #fff;
            border-color: #bb9f03;
            background: rgba(187, 159, 3, 1);
            box-shadow: 0 0 15px rgba(187, 159, 3, 0.4);
            transform: translateY(-2px);
        }

        #counter-text {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <main>
        <div class="hero-container">
            <div class="video-mask-container">
                <video autoplay muted playsinline loop class="cloud-video">
                    <source src="small_clouds2.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <h1 class="full-name">Ishola Akande</h1>

        <p>Cloud Engineer | London, UK</p>

        <div class="tag-container">
            <span class="tag">Home</span>
            <span class="tag">Projects</span>
            <span class="tag">Skills & Certifications</span>
            <span class="tag">Experience</span>
            <span class="tag">About me</span>
        </div>

        <p id="counter-text">This page has been viewed <span id="counter" style="color: #bb9f03; font-weight: bold;">loading...</span> times.</p>
    </main> 
    
    <script>
        // VISITOR COUNTER LOGIC
        async function updateCounter() {
            try {
                let response = await fetch('https://a5rtlq2m6442nhctyd5yc4lzbm0kaxbg.lambda-url.eu-west-2.on.aws/');
                let data = await response.json();
                document.getElementById('counter').innerText = data.views;
            } catch (error) {
                console.error('Error fetching counter:', error);
                document.getElementById('counter').innerText = "error";
            }
        }
        updateCounter();
    </script>
</body>
</html>
