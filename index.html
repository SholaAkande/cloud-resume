<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishola Akande | Cloud Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0a0c10;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        main { 
            text-align: center; 
            z-index: 20; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. THE BIG "IA" BACKGROUND */
        .hero-container {
            position: relative;
            width: 100%;
            height: 300px; /* Define a set height for the IA */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0px; /* Space between IA and your name */
        }

        .video-mask-container {
            width: 100%;
            height: 100%;
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><text x="50%" y="50%" dy=".35em" text-anchor="middle" font-size="350px" font-family="Inter, sans-serif" font-weight="700">IA</text></svg>');
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><text x="50%" y="50%" dy=".35em" text-anchor="middle" font-size="350px" font-family="Inter, sans-serif" font-weight="700">IA</text></svg>');
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }

        .cloud-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            filter: brightness(1.3);
        }

        /* 2. YOUR NAME (Sitting naturally below the IA) */
        .full-name {
            font-size: 3.5rem; 
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #bb9f03;
            margin: 0;
            line-height: 1;
        }

        /* 3. SUBTITLE */
        p {
            font-size: 1.2rem;
            color: #8a8d91;
            margin: 15px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 4. TAGS */
        .tag-container {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .tag {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 4px;
            font-size: .8rem;
            color: #8a8d91;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(5px);
            transition: all .3s ease-in-out;
            cursor: pointer;
        }

        .tag:hover {
                color: #fff;
                border-color: #bb9f03;
                background: rgba(187, 159, 3, 1);
                box-shadow: 0 0 15px rgba(187, 159, 3, 0.4);
                transform: translateY(-2px);
        }

    </style>
</head>
<body>
    <div class="cursor-glow" id="cursor-glow"></div>

    <main>
        <div class="hero-container">
            <div class="video-mask-container">
                <video autoplay muted playsinline class="cloud-video">
                    <source src="small_clouds.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <h1 class="full-name">Ishola Akande</h1>

        <p>Cloud Engineer | London, UK</p>

        <div class="tag-container">
            <span class="tag">AWS S3</span>
            <span class="tag">EC2 (Linux)</span>
            <span class="tag">IAM Security</span>
            <span class="tag">HTML5/CSS3</span>
        </div>
    </main>

    <script>
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
    <script>
    const myVideo = document.querySelector('.cloud-video');

    // This listens for the REAL end of the video file
    myVideo.addEventListener('ended', function() {
        this.currentTime = 0; // Reset to the beginning
        this.play();          // Start playing again
    }, false);
</script>
</body>
</html>
