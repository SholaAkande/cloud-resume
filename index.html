<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
    <main>
        <h1>Ishola Akande</h1>
        <p>Cloud Engineer | London, UK</p>

        <div class="tag-container">
            <span class="tag">AWS S3</span>
            <span class="tag">EC2 (Linux)</span>
            <span class="tag">IAM Security</span>
            <span class="tag">HTML5/CSS3</span>
        </div>
        
    </main>
  
    <style>
      /* Flexbox: The Layout Engine */
      body {
          margin: 0;
          padding: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          background: linear-gradient(135deg, #ffffff 0%, #f0f2f5 100%);
          font-family: 'Inter', -apple-system, sans-serif;
          color: #2f4b6e;
      }

      main {
          text-align: center;
          max-width: 600px;
          padding: 20px;
      }

      h1 {
          font-size: 3rem;
          letter-spacing: -1px;
          margin-bottom: 0;
          text-transform: uppercase;
      }

      p {
          font-size: 1.2rem;
          color: #666;
          margin-top: 5px;
      }

      .tag-container {
        <a href="mailto:your-email@example.com" class="contact-btn">Get In Touch</a>
          margin-top: 30px;
          display: flex;
          gap: 15px;
          justify-content: center;
          flex-wrap: wrap;
      }

      .tag {
          border: 1px solid #232f3e;
          padding: 6px 15px;
          border-radius: 5px;
          font-size: .85rem;
          transition: all 0.3s ease;
      }

      .tag:hover {
        background-color: #232f3e;
        color: white;
      }
    </style>
</body>
</html>
